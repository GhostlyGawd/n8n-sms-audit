name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run tests
        run: python -m pytest tests -v
      - name: Audit sample workflow (smoke test of CLI)
        run: python audit.py sample_workflow.json --format json > /dev/null
      - name: Audit clean sample
        run: python audit.py samples/clean.json
      - name: Audit complex sample
        run: python audit.py samples/complex_multi_issue.json
